<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>基礎問題 Checklist｜面試題 B</title>
	<style>
		:root {
			--paper: #f7fbfd;
			--ink: #2f343a;
			--muted: #6f7780;
			--line: #e7edf2;
			--panel: #ffffff;
			--panel-strong: #eaf6ff;
			--accent: #0072bc;
			--accent-strong: #005a9c;
			--accent-soft: #dff1ff;
			--low: #f6a23b;
			--mid: #0082ca;
			--high: #28bd5c;
			--danger: #9b2c2c;
			--green: #8cc63f;
			--yellow: #f7d36a;
			--sky: #77b6df;
			--shadow: 0 14px 32px rgba(0, 55, 99, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background:
				linear-gradient(160deg, rgba(255, 225, 128, 0.88) 0 23%, transparent 23%),
				linear-gradient(23deg, rgba(233, 247, 234, 0.72) 0 47%, transparent 47%),
				linear-gradient(194deg, transparent 0 59%, rgba(205, 238, 250, 0.86) 59%),
				linear-gradient(117deg, #f7d982 0%, #99d48b 34%, #6fb3db 77%, #5f9fd3 100%);
			color: var(--ink);
			font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
			line-height: 1.65;
			min-height: 100vh;
		}

		body::before {
			background: rgba(255, 255, 255, 0.78);
			clip-path: polygon(0 45%, 100% 20%, 100% 100%, 0 100%);
			content: "";
			inset: 0;
			pointer-events: none;
			position: fixed;
			z-index: -1;
		}

		main {
			max-width: 1280px;
			margin: 0 auto;
			padding: 30px 28px 72px;
		}

		.site-nav {
			margin-bottom: 20px;
		}

		.nav-back {
			background: rgba(255, 255, 255, 0.86);
			border: 1px solid var(--line);
			border-radius: 999px;
			color: var(--accent);
			display: inline-block;
			font-size: 14px;
			font-weight: 800;
			padding: 6px 16px;
			text-decoration: none;
			transition: background 0.15s;
		}

		.nav-back:hover {
			background: var(--accent-soft);
		}

		header {
			background: rgba(255, 255, 255, 0.96);
			border: 1px solid #d5e8f7;
			border-radius: 22px;
			box-shadow: var(--shadow);
			margin-bottom: 30px;
			min-height: 245px;
			padding: 38px 42px 42px;
		}

		.kicker {
			color: var(--accent);
			font-size: 16px;
			font-weight: 900;
			margin: 0 0 18px;
		}

		h1 {
			align-items: center;
			display: flex;
			flex-wrap: wrap;
			font-size: clamp(44px, 5vw, 68px);
			font-weight: 900;
			gap: 14px;
			letter-spacing: 0;
			line-height: 1.15;
			margin: 0 0 20px;
		}

		.hero-title {
			color: var(--green);
			display: inline-block;
			text-shadow: 0 2px 0 rgba(255, 255, 255, 0.7);
		}

		.hero-subtitle {
			background: rgba(140, 198, 63, 0.15);
			border-left: 5px solid var(--accent);
			border-radius: 6px;
			color: var(--accent-strong);
			display: inline-block;
			font-size: clamp(18px, 2vw, 24px);
			font-weight: 900;
			padding: 6px 12px;
		}

		.summary {
			color: var(--muted);
			font-size: 20px;
			font-weight: 700;
			line-height: 1.75;
			margin: 0;
			max-width: 940px;
		}

		section {
			margin-top: 32px;
		}

		h2 {
			align-items: center;
			display: flex;
			font-size: 24px;
			margin: 0 0 14px;
		}

		h2::before {
			background: linear-gradient(180deg, var(--green), var(--accent));
			content: "";
			display: inline-block;
			height: 28px;
			margin-right: 12px;
			width: 5px;
		}

		button,
		input,
		textarea,
		select {
			font: inherit;
		}

		button {
			cursor: pointer;
		}

		.toolbar {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 16px;
			box-shadow: var(--shadow);
			display: grid;
			gap: 16px;
			grid-template-columns: 1fr auto;
			padding: 18px;
		}

		.form-grid {
			display: grid;
			gap: 12px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}

		label {
			color: var(--muted);
			display: grid;
			font-size: 13px;
			font-weight: 700;
			gap: 6px;
		}

		input,
		textarea {
			background: #fbfdff;
			border: 1px solid var(--line);
			border-radius: 10px;
			color: var(--ink);
			padding: 10px 12px;
			width: 100%;
		}

		textarea {
			min-height: 72px;
			resize: vertical;
		}

		.actions {
			align-items: end;
			display: flex;
			gap: 10px;
			justify-content: flex-end;
		}

		.primary-button,
		.secondary-button {
			border-radius: 999px;
			font-weight: 800;
			min-height: 40px;
			padding: 8px 16px;
		}

		.primary-button {
			background: var(--green);
			border: 1px solid var(--green);
			box-shadow: 0 8px 18px rgba(140, 198, 63, 0.28);
			color: #fff;
		}

		.secondary-button {
			background: #fff;
			border: 1px solid var(--line);
			color: var(--accent);
		}

		.export-status {
			color: var(--muted);
			font-size: 13px;
			margin: 8px 0 0;
			text-align: right;
		}

		.checklist-grid {
			display: grid;
			gap: 20px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}

		.section-card {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 16px;
			box-shadow: var(--shadow);
			overflow: hidden;
		}

		.section-head {
			align-items: center;
			background: linear-gradient(90deg, var(--panel-strong), #ffffff);
			border-bottom: 1px solid var(--line);
			display: flex;
			justify-content: space-between;
			padding: 16px 20px;
		}

		.section-title {
			font-size: 18px;
			font-weight: 900;
			margin: 0;
		}

		.section-score {
			background: var(--accent-soft);
			border-radius: 8px;
			color: var(--accent-strong);
			font-size: 15px;
			font-weight: 900;
			padding: 4px 12px;
			white-space: nowrap;
		}

		.section-items {
			list-style: none;
			margin: 0;
			padding: 18px 20px;
		}

		.section-item {
			align-items: flex-start;
			display: flex;
			gap: 10px;
			margin: 10px 0;
		}

		.section-item:first-child {
			margin-top: 0;
		}

		.section-item:last-child {
			margin-bottom: 0;
		}

		.item-checkbox {
			accent-color: var(--accent);
			cursor: pointer;
			flex-shrink: 0;
			height: 20px;
			margin-top: 2px;
			width: 20px;
		}

		.item-label {
			cursor: pointer;
			font-size: 15px;
			line-height: 1.55;
			user-select: none;
		}

		.summary-card {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 16px;
			box-shadow: var(--shadow);
			padding: 28px 30px;
		}

		.total-row {
			align-items: center;
			display: flex;
			gap: 20px;
			margin-bottom: 28px;
		}

		.total-label {
			font-size: 18px;
			font-weight: 900;
			white-space: nowrap;
		}

		.total-bar-wrap {
			background: var(--line);
			border-radius: 999px;
			flex: 1;
			height: 16px;
			overflow: hidden;
		}

		.total-bar {
			background: linear-gradient(90deg, var(--accent), var(--green));
			border-radius: 999px;
			height: 100%;
			transition: width 0.3s ease;
			width: 0%;
		}

		.total-number {
			color: var(--accent);
			font-size: 32px;
			font-weight: 900;
			white-space: nowrap;
		}

		.total-number span {
			color: var(--muted);
			font-size: 18px;
			font-weight: 700;
		}

		.conclusion-title {
			font-size: 16px;
			font-weight: 900;
			margin: 0 0 12px;
		}

		.conclusion-group {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-bottom: 24px;
		}

		.conclusion-button {
			background: #fff;
			border: 2px solid var(--line);
			border-radius: 999px;
			color: var(--ink);
			font-size: 14px;
			font-weight: 800;
			padding: 8px 18px;
			transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
		}

		.conclusion-button:hover {
			border-color: var(--accent);
			color: var(--accent);
		}

		.conclusion-button[data-conclusion="hire"].is-active {
			background: var(--high);
			border-color: var(--high);
			color: #fff;
		}

		.conclusion-button[data-conclusion="conditional"].is-active {
			background: var(--low);
			border-color: var(--low);
			color: #fff;
		}

		.conclusion-button[data-conclusion="reject"].is-active {
			background: var(--danger);
			border-color: var(--danger);
			color: #fff;
		}

		.note-label {
			color: var(--ink);
			font-size: 15px;
			font-weight: 700;
		}

		@media (max-width: 900px) {
			main {
				padding: 20px 16px 48px;
			}

			header {
				padding: 24px 20px;
			}

			.hero-subtitle {
				margin-bottom: 8px;
			}

			.checklist-grid {
				grid-template-columns: 1fr;
			}

			.toolbar {
				grid-template-columns: 1fr;
			}

			.form-grid {
				grid-template-columns: 1fr;
			}

			.actions {
				justify-content: flex-start;
			}

			.total-row {
				flex-wrap: wrap;
			}

			.total-bar-wrap {
				flex-basis: 100%;
				order: 3;
			}
		}

		@media print {
			body {
				background: #fff;
			}

			main {
				max-width: none;
				padding: 18mm;
			}

			.toolbar,
			.section-card,
			.summary-card {
				box-shadow: none;
				page-break-inside: avoid;
			}

			.actions,
			.site-nav,
			.conclusion-group {
				display: none;
			}
		}
	</style>
</head>
<body>
	<main>
		<nav class="site-nav">
			<a class="nav-back" href="index.html">← 返回首頁</a>
		</nav>

		<header>
			<p class="kicker">面試題 B｜基礎問題 Checklist・初階 Java 工程師面試篩選</p>
			<h1>
				<span class="hero-title">基礎問題 Checklist</span>
				<span class="hero-subtitle">面試題 B</span>
			</h1>
			<p class="summary">
				六大類別、26 道基礎能力確認項目，協助面試官快速評估初階 Java 工程師的基礎知識、工作態度與協作能力。各類別配分共計 100 分。
			</p>
		</header>

		<section aria-labelledby="record-title">
			<h2 id="record-title">評分紀錄</h2>
			<div class="toolbar">
				<div class="form-grid">
					<label>
						候選人
						<input id="candidateName" type="text" placeholder="例如：王小明">
					</label>
					<label>
						面試官
						<input id="interviewerName" type="text" placeholder="例如：Tech Lead">
					</label>
					<label>
						面試時間
						<input id="interviewTime" type="datetime-local">
					</label>
					<label>
						整體備註
						<textarea id="overallNote" placeholder="例如：Java 基礎扎實，Spring 觀念需補強，態度積極"></textarea>
					</label>
				</div>
				<div>
					<div class="actions">
						<button class="secondary-button" type="button" id="clearAll">清除所有</button>
						<button class="primary-button" type="button" id="exportResult">匯出結果</button>
					</div>
					<p class="export-status" id="exportStatus">尚未匯出</p>
				</div>
			</div>
		</section>

		<section aria-labelledby="checklist-title">
			<h2 id="checklist-title">基礎能力確認項目</h2>
			<div class="checklist-grid" id="checklistGrid"></div>
		</section>

		<section aria-labelledby="summary-title">
			<h2 id="summary-title">面試總結</h2>
			<div class="summary-card">
				<div class="total-row">
					<span class="total-label">總分</span>
					<div class="total-bar-wrap">
						<div class="total-bar" id="totalBar"></div>
					</div>
					<span class="total-number" id="totalScore">0 <span>/ 100</span></span>
				</div>
				<p class="conclusion-title">面試結論</p>
				<div class="conclusion-group">
					<button class="conclusion-button" type="button" data-conclusion="hire">建議錄取</button>
					<button class="conclusion-button" type="button" data-conclusion="conditional">可錄取，需資深工程師帶領</button>
					<button class="conclusion-button" type="button" data-conclusion="reject">不建議錄取</button>
				</div>
			</div>
		</section>
	</main>

	<script>
		const SECTIONS = [
			{
				id: "sec1",
				title: "一、專案經驗",
				max: 20,
				items: [
					"能說明實際負責過的功能",
					"能說明功能的使用者情境",
					"能說明 Controller → Service → Repository / Adapter 流程",
					"能說明曾經遇過的問題與排查方式",
					"能說明自己在專案中的實際貢獻"
				]
			},
			{
				id: "sec2",
				title: "二、Java 基礎",
				max: 20,
				items: [
					"知道 class / object 差異",
					"知道 interface 的用途",
					"知道 inheritance / polymorphism 基本概念",
					"知道 List / Map / Set 差異",
					"知道 null pointer 發生原因與避免方式"
				]
			},
			{
				id: "sec3",
				title: "三、Spring Boot 基礎",
				max: 25,
				items: [
					"知道 IoC",
					"知道 DI",
					"知道 Bean",
					"知道 Controller / Service / Repository 分層",
					"知道 Constructor Injection",
					"能說明 Field Injection 缺點"
				]
			},
			{
				id: "sec4",
				title: "四、API 基礎",
				max: 15,
				items: [
					"知道 GET / POST / PUT / DELETE 差異",
					"知道 path variable / query param / request body 差異",
					"知道 HTTP status code 基本意義",
					"能看懂 JSON request / response",
					"能用 Postman 或 curl 測 API"
				]
			},
			{
				id: "sec5",
				title: "五、資料庫基礎",
				max: 10,
				items: [
					"知道 table / column / primary key",
					"能寫基本 SELECT",
					"能寫 WHERE 條件",
					"知道 JOIN 基本用途",
					"知道 transaction 基本概念"
				]
			},
			{
				id: "sec6",
				title: "六、Git / 協作",
				max: 10,
				items: [
					"知道 branch / commit / merge",
					"能說明自己平常如何提交程式",
					"能看懂 code review comment",
					"修改前會先確認影響範圍",
					"不會把無關檔案一起 commit"
				]
			}
		];

		const CONCLUSION_LABELS = {
			hire: "建議錄取",
			conditional: "可錄取，需資深工程師帶領",
			reject: "不建議錄取",
			"": "未填寫"
		};

		(function() {
			const now = new Date();
			const pad = n => String(n).padStart(2, "0");
			document.getElementById("interviewTime").value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
		})();

		const grid = document.getElementById("checklistGrid");
		SECTIONS.forEach(section => {
			const card = document.createElement("article");
			card.className = "section-card";
			card.dataset.sectionId = section.id;
			card.dataset.max = section.max;

			const itemsHtml = section.items.map((item, idx) => `
				<li class="section-item">
					<input type="checkbox" class="item-checkbox" id="${section.id}_item${idx}" data-section="${section.id}">
					<label class="item-label" for="${section.id}_item${idx}">${item}</label>
				</li>
			`).join("");

			card.innerHTML = `
				<div class="section-head">
					<h3 class="section-title">${section.title}</h3>
					<span class="section-score" id="${section.id}_score">0 / ${section.max}</span>
				</div>
				<ul class="section-items">${itemsHtml}</ul>
			`;

			grid.appendChild(card);
		});

		function calcSectionScore(sectionId, max) {
			const checkboxes = document.querySelectorAll(`input[data-section="${sectionId}"]`);
			const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
			return Math.round(checked / checkboxes.length * max);
		}

		function updateScores() {
			let total = 0;
			SECTIONS.forEach(section => {
				const score = calcSectionScore(section.id, section.max);
				document.getElementById(`${section.id}_score`).textContent = `${score} / ${section.max}`;
				total += score;
			});
			document.getElementById("totalScore").innerHTML = `${total} <span>/ 100</span>`;
			document.getElementById("totalBar").style.width = `${total}%`;
		}

		document.querySelectorAll(".item-checkbox").forEach(cb => {
			cb.addEventListener("change", updateScores);
		});

		let currentConclusion = "";
		document.querySelectorAll(".conclusion-button").forEach(btn => {
			btn.addEventListener("click", () => {
				const clicked = btn.dataset.conclusion;
				document.querySelectorAll(".conclusion-button").forEach(b => b.classList.remove("is-active"));
				if (currentConclusion !== clicked) {
					btn.classList.add("is-active");
					currentConclusion = clicked;
				} else {
					currentConclusion = "";
				}
			});
		});

		document.getElementById("clearAll").addEventListener("click", () => {
			document.querySelectorAll(".item-checkbox").forEach(cb => cb.checked = false);
			document.querySelectorAll(".conclusion-button").forEach(b => b.classList.remove("is-active"));
			currentConclusion = "";
			document.getElementById("overallNote").value = "";
			updateScores();
			document.getElementById("exportStatus").textContent = "已清除所有資料";
		});

		function escapeHtml(value) {
			return String(value || "")
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/"/g, "&quot;")
				.replace(/'/g, "&#039;");
		}

		function collectResult() {
			const sections = SECTIONS.map(section => {
				const checkboxes = document.querySelectorAll(`input[data-section="${section.id}"]`);
				const checkedItems = section.items.map((label, idx) => ({
					label,
					checked: checkboxes[idx]?.checked || false
				}));
				const score = calcSectionScore(section.id, section.max);
				return { id: section.id, title: section.title, max: section.max, score, items: checkedItems };
			});
			return {
				candidateName: document.getElementById("candidateName").value.trim(),
				interviewTime: document.getElementById("interviewTime").value,
				interviewerName: document.getElementById("interviewerName").value.trim(),
				conclusion: CONCLUSION_LABELS[currentConclusion] || "未填寫",
				overallNote: document.getElementById("overallNote").value.trim(),
				total: sections.reduce((sum, s) => sum + s.score, 0),
				sections,
				exportedAt: new Date().toISOString()
			};
		}

		function renderExportHtml(result) {
			const sectionHtml = result.sections.map(s => `
				<article class="section-card">
					<div class="section-head">
						<span class="section-title">${escapeHtml(s.title)}</span>
						<span class="score-badge">${s.score} / ${s.max}</span>
					</div>
					<ul class="item-list">
						${s.items.map(item => `
							<li class="item ${item.checked ? "checked" : ""}">
								<span class="check">${item.checked ? "✓" : "○"}</span>
								<span>${escapeHtml(item.label)}</span>
							</li>
						`).join("")}
					</ul>
				</article>
			`).join("");

			return `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>基礎問題 Checklist 評分紀錄 - ${escapeHtml(result.candidateName || "候選人")}</title>
	<style>
		body { margin: 0; background: #f7fbfd; color: #2f343a; font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; line-height: 1.65; }
		main { max-width: 1080px; margin: 0 auto; padding: 36px 24px 64px; }
		.page-header { background: #fff; border: 1px solid #dbeaf4; border-radius: 20px; box-shadow: 0 12px 28px rgba(0,55,99,.1); margin-bottom: 20px; padding: 28px 32px; }
		h1 { color: #8cc63f; font-size: 42px; margin: 0 0 10px; }
		.subtitle { color: #6f7780; font-size: 16px; margin: 0; }
		.meta-grid { display: grid; gap: 14px; grid-template-columns: repeat(4,minmax(0,1fr)); margin-bottom: 20px; }
		.meta-card { background: #fff; border: 1px solid #dbeaf4; border-radius: 14px; box-shadow: 0 8px 20px rgba(0,55,99,.08); padding: 16px 20px; }
		.meta-card span { color: #6f7780; display: block; font-size: 13px; font-weight: 800; }
		.meta-card strong { color: #2f343a; display: block; font-size: 17px; margin-top: 4px; word-break: break-word; }
		.total-card { background: #fff; border: 1px solid #dbeaf4; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,55,99,.08); margin-bottom: 20px; padding: 24px 28px; }
		.total-row { align-items: center; display: flex; gap: 16px; margin-bottom: 10px; }
		.total-label { font-size: 16px; font-weight: 900; white-space: nowrap; }
		.bar-wrap { background: #e7edf2; border-radius: 999px; flex: 1; height: 14px; overflow: hidden; }
		.bar-fill { background: linear-gradient(90deg,#0072bc,#8cc63f); border-radius: 999px; height: 100%; }
		.total-num { color: #0072bc; font-size: 28px; font-weight: 900; }
		.note-text { color: #6f7780; font-size: 14px; margin: 8px 0 0; }
		.section-grid { display: grid; gap: 16px; grid-template-columns: repeat(2,minmax(0,1fr)); }
		.section-card { background: #fff; border: 1px solid #dbeaf4; border-radius: 14px; box-shadow: 0 8px 20px rgba(0,55,99,.08); overflow: hidden; }
		.section-head { background: linear-gradient(90deg,#eaf6ff,#fff); border-bottom: 1px solid #e7edf2; display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; }
		.section-title { font-size: 16px; font-weight: 900; }
		.score-badge { background: #dff1ff; border-radius: 8px; color: #005a9c; font-size: 14px; font-weight: 900; padding: 3px 10px; }
		.item-list { list-style: none; margin: 0; padding: 14px 18px; }
		.item { align-items: flex-start; display: flex; font-size: 14px; gap: 8px; margin: 8px 0; }
		.check { flex-shrink: 0; font-size: 14px; }
		.item.checked .check { color: #28bd5c; font-weight: 900; }
		.item.checked { color: #2f343a; }
		.item:not(.checked) { color: #9aacba; }
		.item:not(.checked) .check { color: #c0cdd8; }
		@media (max-width:760px) { .meta-grid,.section-grid { grid-template-columns:1fr; } h1 { font-size:32px; } }
	</style>
</head>
<body>
	<main>
		<div class="page-header">
			<h1>基礎問題 Checklist 評分紀錄</h1>
			<p class="subtitle">匯出時間：${escapeHtml(new Date(result.exportedAt).toLocaleString("zh-TW"))}</p>
		</div>
		<div class="meta-grid">
			<div class="meta-card"><span>候選人</span><strong>${escapeHtml(result.candidateName || "未填寫")}</strong></div>
			<div class="meta-card"><span>面試官</span><strong>${escapeHtml(result.interviewerName || "未填寫")}</strong></div>
			<div class="meta-card"><span>面試時間</span><strong>${result.interviewTime ? escapeHtml(new Date(result.interviewTime).toLocaleString("zh-TW")) : "未填寫"}</strong></div>
			<div class="meta-card"><span>面試結論</span><strong>${escapeHtml(result.conclusion)}</strong></div>
		</div>
		${result.overallNote ? `<div style="background:#fff;border:1px solid #dbeaf4;border-radius:14px;box-shadow:0 8px 20px rgba(0,55,99,.08);margin-bottom:20px;padding:16px 20px;"><span style="color:#6f7780;display:block;font-size:13px;font-weight:800;">整體備註</span><p style="color:#2f343a;font-size:15px;margin:6px 0 0;">${escapeHtml(result.overallNote)}</p></div>` : ""}
		<div class="total-card">
			<div class="total-row">
				<span class="total-label">總分</span>
				<div class="bar-wrap"><div class="bar-fill" style="width:${result.total}%"></div></div>
				<span class="total-num">${result.total} / 100</span>
			</div>
		</div>
		<div class="section-grid">${sectionHtml}</div>
	</main>
</body>
</html>`;
		}

		document.getElementById("exportResult").addEventListener("click", () => {
			const result = collectResult();
			const html = renderExportHtml(result);
			const blob = new Blob([html], { type: "text/html;charset=utf-8" });
			const url = URL.createObjectURL(blob);
			const candidate = result.candidateName || "candidate";
			const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
			const link = document.createElement("a");
			link.href = url;
			link.download = `checklist-result-${candidate}-${timestamp}.html`;
			document.body.appendChild(link);
			link.click();
			link.remove();
			URL.revokeObjectURL(url);
			document.getElementById("exportStatus").textContent = `已匯出 HTML：總分 ${result.total} / 100`;
		});
	</script>
</body>
</html>
